<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Танки: Ангар и Арена</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    
    <!-- ЭКРАН АНГАРА -->
    <div id="hangar-screen" class="screen">
        <h1>АНГАР</h1>
        <div id="points-display">Очки деталей: <span id="player-points">0</span></div>

        <div class="hangar-showcase">
            <!-- Левая колонка: Башня -->
            <div class="hangar-part">
                <img id="hangar-turret-img" src="assets/turret.png" alt="Башня">
                <div id="hangar-turret-name" class="part-name">Плеть</div>
            </div>

            <!-- Центральная колонка: Танк и Лечение -->
            <div class="hangar-center">
                <div class="hangar-visual">
                    <img id="hangar-hull" src="assets/hull.png" alt="Корпус">
                    <img id="hangar-turret" src="assets/turret.png" alt="Башня">
                </div>
                <button id="heal-btn" class="action-btn">Ремонт 20% HP (1 очко)</button>
            </div>

            <!-- Правая колонка: Корпус -->
            <div class="hangar-part">
                <img id="hangar-hull-img" src="assets/hull.png" alt="Корпус">
                <div id="hangar-hull-name" class="part-name">Охотник</div>
            </div>
        </div>

        <div class="hangar-stats">
            <h3>Характеристики сборки:</h3>
            <p>Прочность (Текущая / Макс): <span id="stat-hp" class="highlight"></span></p>
            <p>Броня (Лоб/Борт/Корма): <span id="stat-armor" class="highlight"></span></p>
            <p>Скорость: <span id="stat-speed" class="highlight"></span></p>
            <p>Пробитие: <span id="stat-penetration" class="highlight"></span></p>
        </div>
        
        <button id="to-levels-btn" class="menu-btn">К выбору уровня</button>
    </div>

    <!-- ЭКРАН ВЫБОРА УРОВНЯ -->
    <div id="levels-screen" class="screen" style="display: none;">
        <h1>СЕКТОРА</h1>
        <div class="levels-info">Желтые - доступны | Зеленые - зачищены</div>
        <div id="levels-grid"></div>
        <button id="back-to-hangar-btn" class="menu-btn">В ангар</button>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <canvas id="gameCanvas" style="display: none;"></canvas>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
