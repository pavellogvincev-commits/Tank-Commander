<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank Commander</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ЭКРАН АНГАРА -->
    <div id="hangar-screen" class="screen" style="display: flex;">
        <div class="hangar-container">
            <div class="hangar-header">
                <div class="resources">
                    <span class="res-item">⚙️ <span id="player-points">0</span></span>
                    <span class="res-item" style="color: #00ccff;">★ <span id="inv-hull-val">0</span></span>
                    <span class="res-item" style="color: #ff3333;">★ <span id="inv-turret-val">0</span></span>
                </div>
            </div>
            
            <div class="hangar-body">
                <!-- ЛЕВАЯ ПАНЕЛЬ: Текущая сборка -->
                <div class="panel left-panel">
                    <h2 style="margin-top:0; color:#ffcc00; text-align:center; font-size:16px;">ТЕКУЩАЯ СБОРКА</h2>
                    <div class="assembly-box">
                        <img id="hangar-hull-layer" src="" alt="Корпус">
                        <!-- Башня добавится скриптом -->
                    </div>
                    <div class="hp-info">Прочность: <span id="current-hp-val">0</span> / <span id="max-hp-val">0</span></div>
                    <button id="heal-btn">РЕМОНТ 20% (1 ⚙️)</button>
                    <button id="to-levels-btn">В БОЙ</button>
                </div>

                <!-- СРЕДНЯЯ ПАНЕЛЬ: Выбор детали -->
                <div class="panel mid-panel">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="hulls">КОРПУСА</button>
                        <button class="tab-btn" data-tab="turrets">БАШНИ</button>
                    </div>
                    <div id="parts-list">
                        <!-- Список деталей генерируется скриптом -->
                    </div>
                </div>

                <!-- ПРАВАЯ ПАНЕЛЬ: Характеристики и Прокачка -->
                <div class="panel right-panel" id="details-info">
                    <!-- Характеристики генерируются скриптом -->
                </div>
            </div>
        </div>
    </div>

    <!-- ЭКРАН ВЫБОРА УРОВНЯ -->
    <div id="levels-screen" class="screen" style="background: #08100a;">
        <h1 style="color:#ffcc00; text-align:center; font-size:40px; margin-top:50px; text-shadow:0 0 20px rgba(255, 170, 0, 0.5);">ВЫБОР СЕКТОРА</h1>
        <div id="levels-grid"></div>
        <button id="back-to-hangar-btn" style="margin-top:20px; width:300px; padding: 15px; font-size:18px;">В АНГАР</button>
    </div>

    <!-- ЭКРАН ИГРЫ -->
    <canvas id="gameCanvas" class="screen"></canvas>

    <script type="module" src="js/main.js"></script>
</body>
</html>
